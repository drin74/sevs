<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Совместный просмотр</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="video-section">
            <div class="video-controls">
                <input type="text" id="videoUrl" placeholder="Вставьте ссылку на видео (.mp4)">
                <button id="loadVideoBtn">Загрузить видео</button>
            </div>
            <video id="video" controls>
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            </video>
        </div>

        <div class="chat-section">
            <div class="connection-panel">
                <div class="room-info">
                    <div>Комната: <span id="roomId" class="highlight">...</span></div>
                    <small>Отправьте ID другу</small>
                </div>
                <div class="join-panel">
                    <input type="text" id="friendId" placeholder="ID комнаты">
                    <button id="joinBtn">Войти</button>
                </div>
                <div id="status" class="status disconnected">Не подключено</div>
            </div>

            <div id="chat" class="chat"></div>

            <div class="input-panel">
                <input type="text" id="messageInput" placeholder="Сообщение...">
                <button id="sendBtn">➤</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
